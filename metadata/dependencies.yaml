# Dependency Graph — 上下游依赖图

# 当修改文件 X 时，查此图获得「需要重测/重审哪些文件」。
# 每对依赖关系一行，附带影响摘要。

dependencies:
  # --- Constitution → everything ---
  - upstream: CONSTITUTION.md
    downstream: [SKILL.md, metadata/registry.yaml, assets/schemas/project-state.json]
    impact: "BREAKING — 宪法原则变更会影响所有文件。修改后必须全量 review。"

  # --- Schema → scripts, templates, metadata ---
  - upstream: assets/schemas/project-state.json
    downstream: [scripts/prompt_assembler.py, scripts/export_html.py, scripts/export_xlsx.py, scripts/format_script.py, scripts/storyboard_grid.py, scripts/moodboard_compare.py, metadata/fields.yaml]
    impact: "HIGH — Schema 字段增删改会影响所有脚本的读写逻辑。修改后必须重跑所有脚本的单元测试。"

  # --- Case INDEX → SKILL.md ---
  - upstream: references/cases/INDEX.md
    downstream: [SKILL.md]
    impact: "LOW — 新增案例不影响路由逻辑，仅需确认 INDEX.md 自洽。删除案例需检查是否在 SKILL.md 中被硬引用。"

  # --- Case TEMPLATE → individual cases ---
  - upstream: references/cases/_TEMPLATE.md
    downstream: [references/cases/BR2049.md]
    impact: "MEDIUM — 模板结构变更需检查已有案例是否符合新格式。"

  # --- Director role → DP, pipeline ---
  - upstream: references/roles/director.md
    downstream: [references/pipelines/default.md, references/roles/dp.md]
    impact: "MEDIUM — 导演审核标准变更会影响管线 loop 逻辑和 DP 的交付标准。"

  # --- Pipeline → SKILL.md ---
  - upstream: references/pipelines/default.md
    downstream: [SKILL.md, references/pipelines/fast-track.md, metadata/phase_gates.yaml]
    impact: "MEDIUM — 管线阶段变更需同步更新 SKILL.md 的阶段激活逻辑和 phase_gates.yaml 的门禁规则。"

  - upstream: references/pipelines/fast-track.md
    downstream: [SKILL.md]
    impact: "LOW — 快速管线是 default 的子集，变更频率低。"

  # --- Scene docs → SKILL.md ---
  - upstream: references/scenes/studio-ad.md
    downstream: [SKILL.md]
    impact: "LOW — 场景文档内容变更不影响路由，仅影响该场景下的角色 prompt。"

  - upstream: references/scenes/logo-animation.md
    downstream: [SKILL.md]
    impact: "LOW"

  - upstream: references/scenes/product-demo.md
    downstream: [SKILL.md]
    impact: "LOW"

  - upstream: references/scenes/sci-fi.md
    downstream: [SKILL.md, references/cases/BR2049.md]
    impact: "LOW — 但 BR2049 作为 sci-fi 核心案例，场景文档变化应考虑一致性。"

  # --- Role docs → each other (by phase activation) ---
  - upstream: references/roles/writer.md
    downstream: [references/scenes/product-demo.md]
    impact: "LOW — Writer 技法变更可能影响产品演示的场景模板。"

  - upstream: references/roles/dp.md
    downstream: [references/scenes/studio-ad.md, references/scenes/product-demo.md]
    impact: "LOW"

  - upstream: references/roles/art-director.md
    downstream: [references/scenes/studio-ad.md, references/scenes/logo-animation.md, references/scenes/sci-fi.md, references/media/image-gen-guide.md]
    impact: "MEDIUM — 美术指导的色调/风格库变更会影响所有场景的视觉方向。"

  - upstream: references/roles/vfx.md
    downstream: [references/scenes/logo-animation.md, references/scenes/sci-fi.md]
    impact: "LOW"

  # --- Media → roles ---
  - upstream: references/media/image-gen-guide.md
    downstream: [references/roles/art-director.md, references/media/character-consistency.md]
    impact: "MEDIUM — 生图指南是美术指导生成参考图的核心参考。"

  - upstream: references/media/character-consistency.md
    downstream: [references/roles/art-director.md]
    impact: "LOW"

  - upstream: references/media/tool-matrix.md
    downstream: [SKILL.md]
    impact: "LOW — 工具选择矩阵变更不影响核心管线。"

  # --- Scripts → each other ---
  - upstream: scripts/format_script.py
    downstream: [scripts/prompt_assembler.py]
    impact: "MEDIUM — 剧本格式化输出是创作包组装器的输入之一。"

  - upstream: scripts/storyboard_grid.py
    downstream: [scripts/prompt_assembler.py]
    impact: "MEDIUM — 分镜网格输出是创作包组装器的输入之一。"

  - upstream: scripts/prompt_assembler.py
    downstream: []
    impact: "— 终端脚本，无下游依赖。"

  # --- Export scripts → export templates ---
  - upstream: scripts/export_html.py
    downstream: []
    impact: "— 终端脚本。依赖 assets/templates/export/*.html。"

  - upstream: scripts/export_xlsx.py
    downstream: []
    impact: "— 终端脚本。依赖 assets/templates/export/script-tech.xlsx。"

  # --- Templates → scripts ---
  - upstream: assets/templates/export/script-literary.html
    downstream: [scripts/export_html.py]
    impact: "LOW — HTML 模板样式变更不影响脚本逻辑。"

  - upstream: assets/templates/export/script-storyboard.html
    downstream: [scripts/export_html.py]
    impact: "LOW"

  - upstream: assets/templates/export/script-tech.xlsx
    downstream: [scripts/export_xlsx.py]
    impact: "LOW"

  # --- Phase Gates → validate_state ---
  - upstream: metadata/phase_gates.yaml
    downstream: [scripts/validate_state.py]
    impact: "HIGH — 门禁规则变更直接影响所有阶段的验证行为。修改后必须用示例 project-state 测试全部阶段。"

  - upstream: assets/schemas/project-state.json
    downstream: [scripts/validate_state.py]
    impact: "MEDIUM — Schema 字段路径变更可能需要更新 phase_gates.yaml 中的 field path。"

  # --- Metadata → Constitution ---
  - upstream: metadata/registry.yaml
    downstream: [metadata/dependencies.yaml]
    impact: "MEDIUM — 注册表变更需同步更新依赖图。"

  - upstream: metadata/fields.yaml
    downstream: [metadata/dependencies.yaml]
    impact: "MEDIUM"

  - upstream: metadata/dependencies.yaml
    downstream: [CONSTITUTION.md]
    impact: "LOW — 依赖图是宪法元数据治理章的支撑数据。"

# --- 影响等级速查 ---
# BREAKING: 必须全量 review + 可能需要迁移
# HIGH: 需要重跑测试 + review 下游文件
# MEDIUM: 需要 review 下游文件
# LOW: 通常只影响自身，下游不受影响
