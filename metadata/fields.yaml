# Field Metadata — 字段级元数据

# 每个字段一行，对应 project-state.json 中的路径。
# 新增/修改/删除 Schema 字段必须同步更新此表。
# 用途：回答 "改了 X 字段会影响到哪些角色和哪些阶段？"

fields:
  # --- project ---
  - path: project.title
    type: string
    default: ""
    description: "项目名称"
    affected_roles: [director]
    affected_phases: [1]
    version_added: "0.1.0"
    breaking_change: false

  - path: project.scene_type
    type: enum
    default: "custom"
    # enum_values auto-generated from SKILL.md routing tree — run `build_index.py --list-scenes`
    description: "场景类型 — 决定加载哪个场景文档"
    affected_roles: [director, writer, dp, sound-designer]
    affected_phases: [1, 2, 4, 5]
    version_added: "0.1.0"
    breaking_change: false

  - path: project.aspect_ratio
    type: string
    default: "16:9"
    description: "画面比例"
    affected_roles: [dp, art-director]
    affected_phases: [1, 3, 4, 6]
    version_added: "0.1.0"
    breaking_change: false

  - path: project.duration_est
    type: string
    default: "60s"
    description: "预估时长"
    affected_roles: [writer, director]
    affected_phases: [1, 2, 4]
    version_added: "0.1.0"
    breaking_change: false

  - path: project.genre
    type: string
    default: ""
    description: "创意类型"
    affected_roles: [art-director, sound-designer]
    affected_phases: [1, 3, 5]
    version_added: "0.1.0"
    breaking_change: false

  - path: project.platform
    type: string
    default: ""
    description: "发布平台"
    affected_roles: [director, dp]
    affected_phases: [1, 4]
    version_added: "0.1.0"
    breaking_change: false

  - path: project.language
    type: string
    default: "zh-CN"
    description: "内容语言"
    affected_roles: [writer, sound-designer]
    affected_phases: [2, 4, 5]
    version_added: "0.1.0"
    breaking_change: false

